<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do List</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }

    .container {
      margin-top: 50px;
    }

    input {
      padding: 10px;
      width: 200px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    li {
      list-style: none;
      margin: 10px;
      cursor: pointer;
    }

    .done {
      text-decoration: line-through;
      color: gray;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>To-Do List</h1>
  <input id="taskInput" placeholder="Add a task">
  <button onclick="addTask()">Add</button>

  <ul id="taskList"></ul>
</div>

<script>
function addTask() {
  let input = document.getElementById("taskInput");
  let li = document.createElement("li");

  li.textContent = input.value;

  li.onclick = function() {
    li.classList.toggle("done");
  };

  li.ondblclick = function() {
    li.remove();
  };

  document.getElementById("taskList").appendChild(li);

  input.value = "";
}
</script>

</body>
</html>
